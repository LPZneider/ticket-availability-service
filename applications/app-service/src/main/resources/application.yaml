server:
  port: 8080
spring:
  application:
    name: "TicketAvailabilityService"
  devtools:
    add-properties: false
  h2:
    console:
      enabled: true
      path: "/h2"
  profiles:
    include: null
management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
cors:
  allowed-origins: "http://localhost:4200,http://localhost:8080"
aws:
  region: ${AWS_REGION:us-east-1}
  dynamodb:
    endpoint: "http://localhost:8000"
adapter:
  dynamodb:
    tickets-table-name: ${TICKETS_TABLE_NAME:tickets}
    orders-table-name: ${ORDERS_TABLE_NAME:orders}
